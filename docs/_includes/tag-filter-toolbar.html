<div class="filter-toolbar" data-filter-root="{{ include.root | default: 'content-grid' }}">
  <div class="pf-v6-c-input-group search-input-group">
    <div class="pf-v6-c-input-group__item pf-m-fill">
      <input type="search" class="pf-v6-c-form-control tag-filter-input" placeholder="{{ include.placeholder | default: 'Filter by keyword or tag…' }}" aria-label="Filter content">
    </div>
  </div>
  <div class="filter-tags" role="group" aria-label="Filter by tag">
    {% assign all_tags = include.tags | split: ',' %}
    {% for tag in all_tags %}
    <button type="button" class="pf-v6-c-label tag-filter-btn" data-filter-tag="{{ tag | strip | downcase }}">{{ tag | strip }}</button>
    {% endfor %}
  </div>
</div>
