<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', stored || preferred);
      })();
    </script>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:image" content="{{ site.url }}/assets/images/max-avatar.png">
    <meta property="og:site_name" content="{{ site.title }}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta name="twitter:image" content="{{ site.url }}/assets/images/max-avatar.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700&family=Red+Hat+Text:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@patternfly/patternfly@6.0.0/patternfly.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/patternfly-overrides.css' | relative_url }}">

    <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "{{ site.author.name }}",
      "jobTitle": "{{ site.author.title }}",
      "worksFor": { "@type": "Organization", "name": "{{ site.author.company }}" },
      "url": "{{ site.url }}",
      {% if site.author.email != "" %}"email": "{{ site.author.email }}",{% endif %}
      "sameAs": [
        "https://github.com/{{ site.social.github }}",
        "https://www.linkedin.com/in/{{ site.social.linkedin }}"
      ]
    }
    </script>

    {% if site.google_analytics %}
    {% include google-analytics.html %}
    {% endif %}
</head>
<body class="pf-v6-c-page">
    {% include mobile-feature-banner.html %}
    {% include header.html %}

    <main id="main-content" class="pf-v6-c-page__main-container main-content">
        {{ content }}
    </main>

    {% include footer.html %}

    <script src="https://cdn.jsdelivr.net/npm/lunr@2.3.9/lunr.min.js" defer></script>
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/videos.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/mobile-banners.js' | relative_url }}" defer></script>
</body>
</html>
