<div id="mobile-feature-banner" class="mobile-feature-banner" aria-live="polite" hidden>
  <div class="pf-v6-c-banner pf-m-gold mobile-banner" role="region" aria-label="Featured content">
    <div class="mobile-banner__inner">
      <div class="mobile-banner__text">
        <strong class="mobile-banner__title"></strong>
        <span class="mobile-banner__description"></span>
      </div>
      <a href="#" class="pf-v6-c-button pf-m-link pf-m-sm mobile-banner__cta"></a>
      <button type="button" class="mobile-banner__close" aria-label="Dismiss banner">×</button>
    </div>
  </div>
</div>
<script type="application/json" id="featured-banners-data">{{ site.data.featured_banners | jsonify }}</script>
