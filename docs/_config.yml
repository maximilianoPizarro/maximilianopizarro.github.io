# Site Settings
title: "Maximiliano Pizarro"
description: "Specialist Solution Architect at Red Hat LATAM | OpenShift | Application Platform | Cloud Native Technologies"
tagline: "Personal portfolio with articles, projects, and resources on cloud-native technologies, Red Hat OpenShift, and DevOps"
baseurl: ""  # Debe estar vacío para repositorios username.github.io
url: "https://maximilianopizarro.github.io"

# Google Analytics 4 (Measurement ID). Leave empty to disable tracking locally if desired.
google_analytics: G-Y69BN8T1E6

# Author Information
author:
  name: "Maximiliano Pizarro"
  email: ""
  github: "maximilianoPizarro"
  linkedin: "maximiliano-gregorio-pizarro-consultor-it"
  title: "Specialist Solution Architect"
  company: "Red Hat LATAM"

# Build Settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Theme Settings (commented out to use custom layout)
# theme: minima

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Collections
collections:
  articles:
    output: true
    permalink: /:collection/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "article"

# Social Links
social:
  github: maximilianoPizarro
  linkedin: maximiliano-gregorio-pizarro-consultor-it

# Navigation
navigation:
  - title: Home
    url: /
  - title: Projects
    url: /projects/
  - title: Operators
    url: /operators/
  - title: Charts
    url: /charts/
  - title: Videos
    url: /videos/
  - title: About
    url: /about/
  - title: Search
    url: /search/
